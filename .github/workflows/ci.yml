name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel any in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Pre-existing TypeScript errors in user code (~28 at last count) make
      # this non-blocking for now. Flip continue-on-error off once the debt
      # is paid down so type regressions block PRs.
      - name: Typecheck
        run: npm run check
        continue-on-error: true

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
