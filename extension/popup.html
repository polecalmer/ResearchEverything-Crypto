<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
      background: #ffffff;
      color: #1f2937;
    }
    .header {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #f3f4f6;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
    }
    .header-text p {
      font-size: 11px;
      color: #9ca3af;
    }
    .content {
      padding: 16px;
    }
    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      height: 36px;
      padding: 0 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      color: #1f2937;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
    }
    .field .hint {
      font-size: 10px;
      color: #9ca3af;
      margin-top: 4px;
      line-height: 1.4;
    }
    .btn {
      width: 100%;
      height: 36px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover {
      background: #1d4ed8;
    }
    .btn:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }
    .status {
      font-size: 12px;
      text-align: center;
      padding: 8px;
      border-radius: 8px;
      margin-top: 12px;
      display: none;
    }
    .status.success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }
    .status.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }
    .connected {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: #f0fdf4;
      border-top: 1px solid #f3f4f6;
      font-size: 11px;
      color: #166534;
    }
    .connected .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
    }
    .disconnected {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: #fef9ee;
      border-top: 1px solid #f3f4f6;
      font-size: 11px;
      color: #92400e;
    }
    .disconnected .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f59e0b;
    }
    .instructions {
      padding: 16px;
      border-top: 1px solid #f3f4f6;
    }
    .instructions h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .instructions ol {
      padding-left: 16px;
      font-size: 12px;
      color: #4b5563;
      line-height: 1.8;
    }
    .instructions code {
      background: #f3f4f6;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    details {
      margin-top: 12px;
    }
    details summary {
      font-size: 11px;
      color: #6b7280;
      cursor: pointer;
      user-select: none;
    }
    details .field {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>BookMark</h1>
      <p>AI-Powered Deal Intelligence</p>
    </div>
  </div>

  <div id="connectionStatus"></div>

  <div class="instructions">
    <h3>How to Use</h3>
    <ol>
      <li>Right-click on any webpage</li>
      <li>Select <code>Add to BookMark</code></li>
      <li>3 AI agents research & verify the company</li>
      <li>Deal appears in your pipeline</li>
    </ol>
  </div>

  <div class="content">
    <details>
      <summary>Advanced: Change dashboard URL</summary>
      <div class="field">
        <label>Dashboard URL</label>
        <input type="url" id="dashboardUrl" placeholder="https://workspace.replit.app" />
        <p class="hint">Only change this if you've deployed to a custom domain</p>
      </div>
      <button class="btn" id="saveBtn">Save & Connect</button>
      <div class="status" id="status"></div>
    </details>
  </div>

  <script src="popup.js"></script>
</body>
</html>
